<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  color:white;
  text-align:center;
  overflow-x:hidden;
}

/* HERO (صورتكم) */
.hero {
  position:relative;
  height:100vh;
  background:url("cover.jpg") center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* Overlay */
.hero::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.35);
  top:0;
  left:0;
}

/* TEXT فوق الصورة */
.hero h1, .hero p {
  position:relative;
  z-index:2;
}

.hero h1 {
  font-family:'Playfair Display';
  font-size:48px;
}

.hero p {
  margin-top:10px;
  font-size:18px;
}

/* SECTIONS */
.section {
  padding:60px 20px;
  background:#f7f3ef;
  color:#333;
}

/* COUNTDOWN */
.countdown {
  font-size:26px;
  color:#b89b72;
  margin:20px 0;
}

/* BUTTON */
.btn {
  background:#b89b72;
  color:white;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  margin-top:10px;
}

/* GALLERY */
.gallery {
  display:flex;
  overflow-x:auto;
  gap:15px;
  padding:20px;
}

.gallery img {
  width:260px;
  border-radius:15px;
}

/* RSVP */
input {
  padding:10px;
  width:70%;
  border-radius:10px;
  border:1px solid #ccc;
}

/* MUSIC */
.music {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#b89b72;
  color:white;
  border-radius:50%;
  padding:12px;
  border:none;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>Sherihan & Yassin</h1>
  <p>Wedding Invitation</p>
</div>

<!-- DETAILS -->
<div class="section">

  <h2>Sherihan El Gohary & Yassin Shousha</h2>

  <p>June 5, 2026 — 5:00 PM</p>

  <div id="countdown" class="countdown"></div>

  <button class="btn" onclick="map()">View Location</button>

</div>

<!-- GALLERY -->
<div class="section">
  <h2>Our Moments</h2>

  <div class="gallery">
    <img src="cover.jpg">
    <img src="cover.jpg">
    <img src="cover.jpg">
  </div>
</div>

<!-- RSVP -->
<div class="section">
  <h2>RSVP</h2>

  <input id="name" placeholder="Your Name">
  <br><br>

  <button class="btn" onclick="save()">Confirm Attendance</button>

  <p id="msg"></p>
</div>

<!-- AUDIO -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<button class="music" onclick="toggle()">🎵</button>

<script>
// COUNTDOWN
const d=new Date("June 5, 2026 17:00:00").getTime();
setInterval(()=>{
let now=new Date().getTime();
let t=d-now;

let days=Math.floor(t/(1000*60*60*24));
let h=Math.floor((t%(1000*60*60*24))/(1000*60*60));

document.getElementById("countdown").innerHTML=
days+" Days "+h+" Hours";
},1000);

// MAP
function map(){
window.open("https://www.google.com/maps/search/?api=1&query=Dreamland+Fairy+Garden+Hilton+Pyramids+Golf");
}

// SAVE
function save(){
let name=document.getElementById("name").value;
if(name===""){
document.getElementById("msg").innerText="Enter your name";
return;
}
localStorage.setItem("guest",name);
document.getElementById("msg").innerText="Saved "+name+" ❤️";
}

// MUSIC
function toggle(){
let m=document.getElementById("music");
if(m.paused){m.play()}else{m.pause()}
}
</script>

</body>
</html>
