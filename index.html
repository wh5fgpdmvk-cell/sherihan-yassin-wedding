<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(to bottom,#fdf8f3,#efe7df);
color:#222;
}

.gold{color:#b89b72;}

#cover{
height:100vh;
background:
linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.4)),
url("cover.jpg") center/cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
background:#b89b72;
color:white;
margin-top:15px;
cursor:pointer;
}

.section{
padding:50px 15px;
display:flex;
justify-content:center;
}

.card{
background:white;
padding:30px;
border-radius:20px;
max-width:500px;
width:100%;
box-shadow:0 10px 40px rgba(0,0,0,0.08);
text-align:center;
}

.countdown{
font-size:22px;
color:#b89b72;
margin:20px;
}

.gallery{
display:flex;
overflow-x:auto;
gap:10px;
}

.gallery img{
width:240px;
border-radius:15px;
}

input,textarea{
width:90%;
padding:10px;
margin:10px 0;
border-radius:10px;
border:1px solid #ddd;
}

.music{
position:fixed;
bottom:20px;
right:20px;
background:#b89b72;
color:white;
border-radius:50%;
padding:12px;
border:none;
}
</style>
</head>

<body>

<!-- COVER -->
<div id="cover">
<h3>You have received a wedding invitation</h3>
<h1>Sherihan & Yassin</h1>
<button onclick="openInvite()">Tap to Open</button>
</div>

<div id="main" style="display:none">

<div class="section">
<div class="card">

<p style="font-family:'Playfair Display'; font-size:18px; color:#555;">
We invite you to celebrate with our families and friends
</p>

<h2 style="font-family:'Playfair Display'; font-size:26px;">
Sherihan El Gohary <br> & <br> Yassin Shousha
</h2>

<h2 class="gold">5 June 2026</h2>
<p style="color:#b89b72;">6:00 PM</p>

<div id="countdown" class="countdown"></div>

<p>Counting the days for our forever ❤️</p>

</div>
</div>

<!-- RSVP -->
<div class="section">
<div class="card">
<h2 class="gold">RSVP</h2>

<input id="name" placeholder="Name">
<input id="song" placeholder="Song request">
<textarea id="note" placeholder="Leave a note ❤️"></textarea>

<button onclick="sendRSVP()">Confirm RSVP</button>
<p id="msg"></p>

</div>
</div>

</div>

<!-- AUDIO -->
<audio id="music" loop preload="auto">
<source src="song.mp3" type="audio/mp3">
</audio>

<button class="music" onclick="toggle()">🎵</button>

<script>

// OPEN
function openInvite(){
document.getElementById("cover").style.display="none";
document.getElementById("main").style.display="block";
startMusic();
}

// 🔥 MUSIC FIX (starts from 27s)
let musicStarted = false;

function startMusic(){
const music = document.getElementById("music");

if(!musicStarted){
musicStarted = true;

function playFrom27(){
music.currentTime = 27;
music.play().catch(()=>{});
}

if(music.readyState >= 2){
playFrom27();
}else{
music.addEventListener("canplay", playFrom27, { once: true });
}
}
}

document.addEventListener("click", startMusic);

// COUNTDOWN
const date=new Date("June 5, 2026 18:00:00").getTime();

setInterval(()=>{
let now=new Date().getTime();
let d=date-now;

let days=Math.floor(d/(1000*60*60*24));
let h=Math.floor((d%(1000*60*60*24))/(1000*60*60));
let m=Math.floor((d%(1000*60*60))/(1000*60));
let s=Math.floor((d%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
days+" Days "+h+" Hours "+m+" Minutes "+s+" Seconds";

},1000);

// RSVP (opens form)
function sendRSVP(){

let name=document.getElementById("name").value;
let song=document.getElementById("song").value;
let note=document.getElementById("note").value;

let url =
"https://docs.google.com/forms/d/e/1FAIpQLSf4cIVPfW2Dv17J4_uoeaIn3h6EUuMej0YP_N6wfeSPzsXKEQ/viewform?usp=pp_url"
+ "&entry.877086558=" + encodeURIComponent(name)
+ "&entry.1498135098=" + encodeURIComponent(song)
+ "&entry.1424661284=" + encodeURIComponent(note);

window.location.href = url;
}

// MUSIC BUTTON
function toggle(){
let m=document.getElementById("music");
if(m.paused){m.play()}else{m.pause()}
}

</script>

</body>
</html>
